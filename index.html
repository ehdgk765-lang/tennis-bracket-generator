<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>테니스 클럽 대진표</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- 헤더 -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-4xl mx-auto px-4">
      <div class="flex items-center justify-center py-3">
        <h1 class="text-lg font-bold text-green-700">🎾 테니스 클럽</h1>
      </div>
      <!-- 탭 네비게이션 -->
      <nav class="flex -mb-px">
        <button data-tab="players"
          class="flex-1 min-w-0 px-2 sm:px-3 py-3 text-xs sm:text-sm font-medium text-center border-b-2 border-transparent transition whitespace-nowrap text-gray-500 hover:text-gray-700 active:bg-gray-50">
          선수 관리
        </button>
        <button data-tab="create"
          class="flex-1 min-w-0 px-2 sm:px-3 py-3 text-xs sm:text-sm font-medium text-center border-b-2 border-transparent transition whitespace-nowrap text-gray-500 hover:text-gray-700 active:bg-gray-50">
          대회 만들기
        </button>
        <button data-tab="active"
          class="flex-1 min-w-0 px-2 sm:px-3 py-3 text-xs sm:text-sm font-medium text-center border-b-2 border-transparent transition whitespace-nowrap text-gray-500 hover:text-gray-700 active:bg-gray-50">
          진행 중
        </button>
        <button data-tab="history"
          class="flex-1 min-w-0 px-2 sm:px-3 py-3 text-xs sm:text-sm font-medium text-center border-b-2 border-transparent transition whitespace-nowrap text-gray-500 hover:text-gray-700 active:bg-gray-50">
          대회 기록
        </button>
      </nav>
    </div>
  </header>

  <!-- 메인 콘텐츠 -->
  <main id="main-content" class="max-w-4xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
  </main>

  <!-- JS 모듈 (의존성 순서대로) -->
  <script src="js/storage.js"></script>
  <script src="js/results.js"></script>
  <script src="js/players.js"></script>
  <script src="js/tournament.js"></script>
  <script src="js/league.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
